      await loadFormations();toast('✅ Formazione manuale salvata!');currentView.value='formations';
    };

    // ── PREDIZIONE RISULTATO FORMAZIONE ──
    const computeFormationPrediction = (f) => {
      const getAvg = (pids) => {
        if (!pids?.length) return 6;
        const ps = pids.map(pid => groupPlayers.value.find(p=>p.id===pid)).filter(Boolean);
        if (!ps.length) return 6;
        // Composite score: mediaPunti * 40 + mediaVoto * 10 + goalPerGame * 20
        const scores = ps.map(p => {
          const mp = p.mediaPunti||0;
          const mv = p.mediaVoto||0;
          const gpg = p.partiteTotali>0?(p.goalTotali||0)/p.partiteTotali:0;
          const upp = p.partiteTotali>0?(p.uomoPartitaTotali||0)/p.partiteTotali:0;
          return mp*40 + mv*10 + gpg*20 + upp*30;
        });
        return scores.reduce((a,b)=>a+b,0)/scores.length;
      };

      const scoreA = getAvg(f.squadraA);
      const scoreB = getAvg(f.squadraB);
      const total = scoreA + scoreB;
      if (total === 0) return {quoteA:'2.00',quoteX:'3.00',quoteB:'2.00',verdict:'Squadre equivalenti — tutto aperto!'};

      const probA = scoreA/total;
      const probB = scoreB/total;
      const probX = 0.25; // draw probability buffer
      const adjA = probA*(1-probX);
      const adjB = probB*(1-probX);

      // Convert to odds (European format), with bookmaker margin ~10%
      const margin = 1.10;
      const oddA = Math.max(1.20, Math.round((1/adjA)*margin*100)/100);
      const oddX = Math.max(2.50, Math.round((1/probX)*margin*100)/100);
      const oddB = Math.max(1.20, Math.round((1/adjB)*margin*100)/100);

      const diff = Math.abs(scoreA - scoreB);
      const favA = scoreA > scoreB;
      const nA = f.nomeSquadraA || 'Squadra A';
      const nB = f.nomeSquadraB || 'Squadra B';

      let verdict = '';
      if (diff < 5) {
        verdict = `⚖️ Equilibrio totale! Potrebbe vincere chiunque. Atteso un risultato combattuto.`;
      } else if (diff < 15) {
        const fav = favA ? nA : nB;
        verdict = `📊 ${fav} parte favorita ma non di molto. Aspettatevi gol da entrambe le parti.`;
      } else {
        const fav = favA ? nA : nB;
        const under = favA ? nB : nA;
        verdict = `⚡ ${fav} nettamente favorita per forma e statistiche. ${under} dovrà fare l'impresa!`;
      }

      // Score prediction
      const totalGoalsExpected = 5 + Math.floor(Math.random()*3);
      const goalsA = Math.round(totalGoalsExpected*(adjA/(adjA+adjB)));
      const goalsB = totalGoalsExpected - goalsA;
      verdict += ` Risultato probabile: ${goalsA}-${goalsB}.`;

      return {
        quoteA: oddA.toFixed(2),
        quoteX: oddX.toFixed(2),
        quoteB: oddB.toFixed(2),
        verdict
      };
    };

      fgGrad.addColorStop(0,'#0a200a');fgGrad.addColorStop(0.4,'#133318');fgGrad.addColorStop(1,'#1a4520');
      ctx.fillStyle=fgGrad;ctx.fillRect(0,H*0.65,W,H*0.35);

      midG.addColorStop(0,'#081420');midG.addColorStop(1,'#0a200a');
      ctx.fillStyle=midG;ctx.fillRect(0,H*0.60,W,H*0.15);

      // Floodlights - LEFT
      const fl1=ctx.createRadialGradient(40,80,0,40,80,320);
      fl1.addColorStop(0,'rgba(255,255,220,0.95)');fl1.addColorStop(0.06,'rgba(255,255,200,0.75)');fl1.addColorStop(0.2,'rgba(200,220,255,0.35)');fl1.addColorStop(0.5,'rgba(100,150,255,0.12)');fl1.addColorStop(1,'transparent');
      ctx.fillStyle=fl1;ctx.fillRect(0,0,W*0.55,H*0.55);
      // Floodlights - RIGHT
      const fl2=ctx.createRadialGradient(W-40,80,0,W-40,80,320);
      fl2.addColorStop(0,'rgba(255,255,220,0.95)');fl2.addColorStop(0.06,'rgba(255,255,200,0.75)');fl2.addColorStop(0.2,'rgba(100,150,255,0.35)');fl2.addColorStop(0.5,'rgba(50,100,255,0.12)');fl2.addColorStop(1,'transparent');
      ctx.fillStyle=fl2;ctx.fillRect(W*0.45,0,W*0.55,H*0.55);

      const cDark=ctx.createRadialGradient(W/2,150,80,W/2,150,400);
      cDark.addColorStop(0,'rgba(0,0,0,0.55)');cDark.addColorStop(1,'transparent');
      ctx.fillStyle=cDark;ctx.fillRect(0,0,W,350);

      // ═══ 2. HEADER ═══
      ctx.textAlign='center';
      // SQUADRE UFFICIALI
      ctx.font='900 78px "Arial Black",Arial';ctx.fillStyle='#ffffff';
      ctx.shadowColor='rgba(0,0,0,0.9)';ctx.shadowBlur=18;ctx.fillText('SQUADRE UFFICIALI',W/2,108);

      ctx.font='900 italic 88px "Arial Black",Arial';
      const gPS=ctx.createLinearGradient(0,0,W,0);gPS.addColorStop(0,'#8FE600');gPS.addColorStop(0.5,'#C8FF00');gPS.addColorStop(1,'#8FE600');
      ctx.fillStyle=gPS;ctx.fillText('PER STASERA!',W/2,206);ctx.shadowBlur=0;

      ctx.font='700 28px "Arial Black",Arial';ctx.fillStyle='#ffffff';

      // ═══ 3. PANELS ═══
      const PAD=18, GAP=16;
      const PW=(W-PAD*2-GAP)/2;  // panel width
      const PY=272, PH=H-PY-230; // panel area
      const PLX=PAD, PRX=PAD+PW+GAP; // panel left x, right x

      // LEFT PANEL (Team B - lime green)
      const bCol='#A8FF00', bBg='rgba(0,30,0,0.82)', bBorder='rgba(120,220,0,0.85)';
      ctx.save();ctx.shadowColor='rgba(100,220,0,0.5)';ctx.shadowBlur=20;ctx.fillStyle=bBg;
      rrect(PLX,PY,PW,PH,20);ctx.fill();ctx.restore();
      ctx.strokeStyle=bBorder;ctx.lineWidth=3;rrect(PLX,PY,PW,PH,20);ctx.stroke();

      // RIGHT PANEL (Team A - blue)
      const aCol='#5599FF', aBg='rgba(0,10,40,0.82)', aBorder='rgba(60,120,255,0.85)';
      ctx.save();ctx.shadowColor='rgba(60,120,255,0.5)';ctx.shadowBlur=20;ctx.fillStyle=aBg;
      rrect(PRX,PY,PW,PH,20);ctx.fill();ctx.restore();
      ctx.strokeStyle=aBorder;ctx.lineWidth=3;rrect(PRX,PY,PW,PH,20);ctx.stroke();

      // Team name pills
      const drawTeamPill=(name,cx,py2,col)=>{
        ctx.font='900 28px "Arial Black",Arial';
        const tw=ctx.measureText(name.toUpperCase()).width, pw=Math.max(tw+50,180), ph=52;
        const bx=cx-pw/2, by=py2;
        ctx.fillStyle='rgba(0,0,0,0.7)';rrect(bx,by,pw,ph,26);ctx.fill();
        ctx.strokeStyle=col;ctx.lineWidth=3;rrect(bx,by,pw,ph,26);ctx.stroke();
        ctx.fillStyle=col;ctx.textAlign='center';ctx.font='900 26px "Arial Black",Arial';
        ctx.shadowColor='rgba(0,0,0,0.8)';ctx.shadowBlur=6;
        ctx.fillText(name.toUpperCase(),cx,by+35);ctx.shadowBlur=0;
      };
      drawTeamPill(f.nomeSquadraB||'Squadra B', PLX+PW/2, PY+14, bCol);
      drawTeamPill(f.nomeSquadraA||'Squadra A', PRX+PW/2, PY+14, aCol);

      // VS center
      ctx.font='900 italic 80px "Arial Black",Arial';ctx.textAlign='center';
      ctx.fillStyle='#ffffff';ctx.shadowColor='rgba(0,0,0,0.9)';ctx.shadowBlur=16;
      // Diagonal slash effect
      ctx.save();ctx.translate(W/2,PY+PH/2);ctx.rotate(-0.08);
      ctx.fillText('VS',0,14);
      ctx.restore();ctx.shadowBlur=0;

      // ── DRAW PLAYERS IN PANEL ──
      const drawPlayerGrid=async(ids,panelX,panelY,panelW,col)=>{
        if(!ids?.length)return;
        const PLAYER_Y_START=panelY+80; // below pill
        const PLAYER_AREA=panelH-110;
        // 2-column grid
        const COLS=2, R=42;
        const colW=panelW/COLS;
        const nRows=Math.ceil(ids.length/COLS);
        const rowH=Math.min(PLAYER_AREA/nRows, R*2+52);
        const gridH=nRows*rowH;
        const startY=PLAYER_Y_START+(PLAYER_AREA-gridH)/2;

        for(let idx=0;idx<ids.length;idx++){
          const pid=ids[idx];
          const p=getPlayer(pid);if(!p)continue;
          const row=Math.floor(idx/COLS), col2=idx%COLS;
          const isLastOdd=(ids.length%2!==0&&idx===ids.length-1);
          const px=isLastOdd?panelX+panelW/2:panelX+colW*col2+colW/2;
          const py=startY+row*rowH+R;

          // White circle
          ctx.beginPath();ctx.arc(px,py,R+2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();
          // Photo or silhouette
          ctx.save();ctx.beginPath();ctx.arc(px,py,R,0,Math.PI*2);ctx.clip();
          const ph=pc[pid];
          if(ph){
            const iw=ph.naturalWidth||100,ih=ph.naturalHeight||100,s=Math.min(iw,ih),sx=(iw-s)/2,sy=(ih-s)/2;
            ctx.drawImage(ph,sx,sy,s,s,px-R,py-R,R*2,R*2);
          }else{
            // Silhouette like reference (white bg + dark person shape)
            ctx.fillStyle='#e8eaf0';ctx.fillRect(px-R,py-R,R*2,R*2);
            ctx.fillStyle='#1a1a2a';
            // Head
            ctx.beginPath();ctx.arc(px,py-R*0.28,R*0.34,0,Math.PI*2);ctx.fill();
            // Shoulders/body
            ctx.beginPath();ctx.ellipse(px,py+R*0.42,R*0.58,R*0.48,0,Math.PI,0);ctx.fill();
          }
          ctx.restore();
          // Name
          const ns=(p.soprannome||p.nome||'').toUpperCase();
          ctx.font=`700 ${Math.max(16,Math.min(20,Math.floor(80/Math.max(ns.length,4))))}px "Arial Black",Arial`;
          ctx.fillStyle='#ffffff';ctx.textAlign='center';
          ctx.shadowColor='rgba(0,0,0,0.9)';ctx.shadowBlur=6;
          ctx.fillText(ns,px,py+R+20);ctx.shadowBlur=0;
        }
      };

      const panelH=PH; // capture for drawPlayerGrid
      await drawPlayerGrid(f.squadraB||[], PLX, PY, PW, bCol);
      await drawPlayerGrid(f.squadraA||[], PRX, PY, PW, aCol);

      // ═══ 4. FOOTER BAR ═══
      const FOOT_Y=PY+PH+18;

      const iPillH=90, iPillY=FOOT_Y;

      // Location text
      if(f.matchLuogo){
        ctx.font='700 18px "Arial Black",Arial';ctx.fillStyle='rgba(255,255,255,0.7)';ctx.textAlign='left';
        ctx.fillText('CAMPO',W/2+106,iPillY+34);
        ctx.font='900 28px "Arial Black",Arial';ctx.fillStyle=aCol;
        ctx.fillText(f.matchLuogo.toUpperCase(),W/2+106,iPillY+66);
      }

      // ═══ 5. SLOGAN + BALLS ═══
      const SLOG_Y=FOOT_Y+iPillH+20;
      ctx.font='52px Arial';ctx.textAlign='center';ctx.shadowColor='rgba(0,0,0,0.8)';ctx.shadowBlur=8;
      ctx.fillText('⚽',60,SLOG_Y+58);ctx.fillText('⚽',W-60,SLOG_Y+58);
      ctx.font='900 italic 48px "Arial Black",Arial';
      const gSlo=ctx.createLinearGradient(0,0,W,0);gSlo.addColorStop(0,'#ffffff');gSlo.addColorStop(0.5,bCol);gSlo.addColorStop(1,'#ffffff');
      ctx.fillStyle=gSlo;ctx.fillText('PRONTI A DARE TUTTO!',W/2,SLOG_Y+54);
      ctx.font='700 22px "Arial Black",Arial';ctx.fillStyle='rgba(255,255,255,0.75)';
      ctx.fillText('★  BUON DIVERTIMENTO A TUTTI!  ★',W/2,SLOG_Y+90);ctx.shadowBlur=0;

      // Watermark
      ctx.font='400 13px Arial';ctx.fillStyle='rgba(255,255,255,0.18)';
      ctx.fillText('⚽ Amici FC · '+(currentGroup.value?.nome||''),W/2,H-10);

      return canvas.toDataURL('image/png');

        const canvas = await html2canvas(el, {
          backgroundColor: null, scale: 2,
          useCORS: true, allowTaint: true
        });
        generatedPNG.value = canvas.toDataURL('image/png');
        toast('✅ PNG generato!');
      } catch (err) {
        console.error('PNG error:', err);
        toast('❌ Errore PNG', 'error');
      }
    };

    const downloadPNG = (dataUrl, name) => {
      previewPNGUrl.value  = dataUrl;
      previewPNGName.value = `amicifc-${name}.png`;
      showPNGPreview.value = true;
    };

    const viewMatchPNG = (m, type) => {
      const url = type==='formation' ? m.pngFormazione : type==='result' ? m.pngRisultato : m.pngPagelle;
      if (!url) { toast('PNG non disponibile per questa partita', 'info'); return; }
      downloadPNG(url, type);
    };

    // ── Save Match ──
    const saveMatch = async () => {
      if (!currentGroup.value) return;

      const goalA = matchGoalA.value, goalB = matchGoalB.value;
      const teamAWon = goalA > goalB, isDraw = goalA === goalB;

      // Build stats + calculate punti for each player
      const statsArr = [...teamA.value, ...teamB.value].map(pid => {
        const inA  = teamA.value.includes(pid);
        const punti = isDraw ? 1 : ((inA && teamAWon) || (!inA && !teamAWon)) ? 3 : 0;
        return {
          playerId:    pid,
          goal:        playerStats.value[pid]?.goal        || 0,
          assist:      playerStats.value[pid]?.assist      || 0,
          autogol:     playerStats.value[pid]?.autogol     || 0,
          voto:        playerStats.value[pid]?.voto        || 0,
          uomoPartita: playerStats.value[pid]?.uomoPartita || false,
          punti
        };
      });

      const upId    = computedUomoPartita.value;
      const upName  = upId ? (getPlayer(upId)?.soprannome || getPlayer(upId)?.nome) : null;
      const mvpId   = computedMVP.value;
      const mvpName = mvpId ? (getPlayer(mvpId)?.soprannome || getPlayer(mvpId)?.nome) : null;

      let pngForm='', pngRes='', pngPag='';
      try { await generatePNG('formation'); pngForm = generatedPNG.value; } catch {}
      try { await generatePNG('result');    pngRes  = generatedPNG.value; } catch {}
      try { await generatePNG('pagelle');   pngPag  = generatedPNG.value; } catch {}

      const match = {
        id:         uuid(),
        groupId:    currentGroup.value.id,
        data:       matchInfo.value.data || new Date().toISOString().slice(0,10),
        orario:     matchInfo.value.orario || '',
        luogo:      matchInfo.value.luogo || '',
        nomeSquadraA: activeFormation.value?.nomeSquadraA || matchInfo.value.nomeSquadraA || 'Squadra A',
        nomeSquadraB: activeFormation.value?.nomeSquadraB || matchInfo.value.nomeSquadraB || 'Squadra B',
        squadraA:   [...teamA.value],
        squadraB:   [...teamB.value],
        risultato:  { goalA, goalB },
        statisticheGiocatori: statsArr,
        commentoAI:      aiComment.value,
        titoloGiornale:  articleTitle.value || '',
        fotoPartita:     matchPhoto.value || '',
        notePartita: matchNotes.value,
        mvp:         mvpName,
        uomoPartita: upName,
        pngFormazione: pngForm,
        pngRisultato:  pngRes,
        pngPagelle:    pngPag,
        appVersion:    appVersion.value
      };

      await db.matches.add(match);

      // Mark the formation as played
      if (activeFormation.value?.id) {
        await db.formations.update(activeFormation.value.id, { stato: 'giocata', matchId: match.id });
      }
      activeFormation.value = null;

      // Update aggregate player stats
      for (const s of statsArr) {
        const p = groupPlayers.value.find(x => x.id === s.playerId);
        if (!p) continue;
        let nuovaMedia = p.mediaVoto || 0, nuoviVoti = p.votiTotali || 0;
        if (s.voto > 0) {
          nuoviVoti++;
          nuovaMedia = ((p.mediaVoto || 0) * (p.votiTotali || 0) + s.voto) / nuoviVoti;
        }
        const nuoviPunti   = (p.puntiTotali  || 0) + s.punti;
        const nuovePartite = (p.partiteTotali || 0) + 1;
        await db.players.update(s.playerId, {
          goalTotali:        (p.goalTotali        || 0) + s.goal,
          assistTotali:      (p.assistTotali      || 0) + s.assist,
          autogolTotali:     (p.autogolTotali     || 0) + s.autogol,
          uomoPartitaTotali: (p.uomoPartitaTotali || 0) + (s.uomoPartita ? 1 : 0),
          puntiTotali:       nuoviPunti,
          partiteTotali:     nuovePartite,
          mediaPunti:        nuovePartite > 0 ? nuoviPunti / nuovePartite : 0,
          votiTotali:        nuoviVoti,
          mediaVoto:         nuovaMedia
        });
      }

      // FIX6: Recompute all stats from scratch after save (prevents drift)
      await recomputeStats();

      await loadGroupData();
      toast('🏆 Partita salvata!');
      currentView.value = 'history';
      // Auto-sync se Firebase è configurato e loggato
      autoSyncToCloud();
    };

    const confirmDeleteModal = reactive({ show: false, matchId: null, matchInfo: '' });
    // FIX1: Edit match
    const showEditMatch  = ref(false);
    const editingMatch   = ref(null);
    const openEditMatch  = (m) => { editingMatch.value = JSON.parse(JSON.stringify(m)); showEditMatch.value = true; };
    const movePlayerInEdit = (pid, from, to) => {
      if (!editingMatch.value) return;
      if (from === 'A') {
        editingMatch.value.squadraA = editingMatch.value.squadraA.filter(x => x !== pid);
        if (!editingMatch.value.squadraB) editingMatch.value.squadraB = [];
        editingMatch.value.squadraB.push(pid);
      } else {
        editingMatch.value.squadraB = editingMatch.value.squadraB.filter(x => x !== pid);
        if (!editingMatch.value.squadraA) editingMatch.value.squadraA = [];
        editingMatch.value.squadraA.push(pid);
      }
    };
    const saveEditMatch = async () => {
      if (!editingMatch.value) return;
      // Deep-deproxy: Vue reactive Proxy objects cannot be cloned by IndexedDB
      // JSON round-trip strips all Proxy wrappers
      const m = JSON.parse(JSON.stringify(editingMatch.value));
      try {
        const updated = await db.matches.update(m.id, {
          data:                   m.data,
          luogo:                  m.luogo,
          nomeSquadraA:           m.nomeSquadraA,
          nomeSquadraB:           m.nomeSquadraB,
          squadraA:               m.squadraA,
          squadraB:               m.squadraB,
          risultato:              m.risultato,
          statisticheGiocatori:   m.statisticheGiocatori,
          notePartita:            m.notePartita,
          titoloGiornale:         m.titoloGiornale,
          commentoAI:             m.commentoAI,
        });
        if (!updated) {
          await db.matches.put({ ...m });
        }
        await recomputeStats();
        await loadGroupData();
        showEditMatch.value = false;
        editingMatch.value  = null;
        toast('✅ Partita aggiornata', 'success');
        autoSyncToCloud();
      } catch(e) {
        console.error('saveEditMatch error:', e);
        toast('❌ Errore salvataggio: ' + e.message, 'error');
      }
    };
    const askDeleteMatch = (m) => {
      confirmDeleteModal.matchId = m.id;
      confirmDeleteModal.matchInfo = `${m.data || ''} · ${m.nomeSquadraA||'A'} ${m.risultato?.goalA||0} - ${m.risultato?.goalB||0} ${m.nomeSquadraB||'B'}`;
      confirmDeleteModal.show = true;
    };
    const confirmDeleteDo = async () => {
      confirmDeleteModal.show = false;
      const id = confirmDeleteModal.matchId;
      if (!id) return;
      await db.matches.delete(id);
      await loadGroupData();
      toast('🗑️ Partita eliminata', 'error');
    };
    const deleteMatch = async id => {
      if (!confirm('Eliminare questa partita?')) return;
      await db.matches.delete(id);
      await loadGroupData();
      toast('🗑️ Partita eliminata', 'error');
    };

    // FIX4: Regenerate newspaper from history match
    const regenerateNewspaper = async (m) => {
      if (!m) return;
      // Set reactive state from saved match data so generateAndShareMatchPNG works
      aiComment.value = m.commentoAI || '';
      articleTitle.value = m.titoloGiornale || m.articleTitle || '';
      matchPhoto.value = m.fotoPartita || '';
      matchGoalA.value = m.risultato?.goalA || 0;
      matchGoalB.value = m.risultato?.goalB || 0;
      if (!matchInfo.value) matchInfo.value = {};
      matchInfo.value.nomeSquadraA = m.nomeSquadraA || 'Squadra A';
      matchInfo.value.nomeSquadraB = m.nomeSquadraB || 'Squadra B';
      matchInfo.value.luogo = m.luogo || '';
      matchInfo.value.data = m.data || '';
      teamA.value = m.squadraA || [];
      teamB.value = m.squadraB || [];
      // Set playerStats from match statisticheGiocatori
      playerStats.value = {};
      for (const s of m.statisticheGiocatori || []) {
        playerStats.value[s.playerId] = { goal: s.goal||0, assist: s.assist||0, voto: s.voto||0, autogol: s.autogol||0, uomoPartita: s.uomoPartita||false };
      }
      await generateAndShareMatchPNG();
    };

    const viewMatch = m => { detailMatch.value = m; showMatchDetail.value = true; };

    const sortedByRole = (pids) => {
      if (!pids) return [];
      const order = { 'Portiere':0,'Difensore':1,'Centrocampista':2,'Attaccante':3,'Jolly':4 };
      return [...pids].sort((a,b) => (order[getPlayer(a)?.ruolo]??4)-(order[getPlayer(b)?.ruolo]??4));
    };

    const getStatForMatch = (m, pid, field) => {
      const s = m.statisticheGiocatori?.find(x => x.playerId === pid);
      return s?.[field] ?? (field==='voto' ? 6 : 0);
    };

    // ── Firebase Cloud Sync ──
    const getFirebaseBase = () => {
      const url = (settings.value.firebaseUrl || '').replace(/\/$/, '');
      return url ? `${url}/amicifc` : null;
    };

    // ── Repair malformed UIDs (uid = "Nome|Cognome" or missing) ──
    const repairPlayerUids = async () => {
      const allPlayers = await db.players.toArray();
      const isRealUid = u => u && u.length > 8 && !u.includes('|') && !u.includes(' ');
      let fixed = 0;
      for (const p of allPlayers) {
        if (!isRealUid(p.uid)) {
          await db.players.update(p.id, { uid: uuid() });
          fixed++;
        }
      }
      if (fixed > 0) console.log(`[AmiciFC] Repaired ${fixed} player UIDs`);
    };
    const recomputeStats = async () => {
      if (!currentGroup.value) return;
      const allPlayers = await db.players.where('groupId').equals(currentGroup.value.id).toArray();
      const allMatches = await db.matches.where('groupId').equals(currentGroup.value.id).toArray();

      // Reset all stats to 0
      const statsMap = {};
      allPlayers.forEach(p => {
        statsMap[p.id] = {
          goalTotali:0, assistTotali:0, autogolTotali:0, uomoPartitaTotali:0,
          puntiTotali:0, partiteTotali:0, votiTotali:0, votiSum:0
        };
      });

      // Accumulate from every match
      for (const m of allMatches) {
        const goalA = m.risultato?.goalA || 0;
        const goalB = m.risultato?.goalB || 0;
        const teamAWon = goalA > goalB, isDraw = goalA === goalB;

        for (const s of (m.statisticheGiocatori || [])) {
          const pid = s.playerId;
          if (!statsMap[pid]) continue;
          const st = statsMap[pid];

          // Calculate points from match result if not stored
          let punti = s.punti;
          if (punti === undefined || punti === null) {
            const inA = (m.squadraA||[]).includes(pid);
            punti = isDraw ? 1 : ((inA && teamAWon) || (!inA && !teamAWon)) ? 3 : 0;
          }

          st.goalTotali        += s.goal        || 0;
          st.assistTotali      += s.assist      || 0;
          st.autogolTotali     += s.autogol     || 0;
          st.uomoPartitaTotali += s.uomoPartita ? 1 : 0;
          st.puntiTotali       += punti;
          st.partiteTotali     += 1;
          if ((s.voto||0) > 0) {
            st.votiTotali++;
            st.votiSum += s.voto;
          }
        }
      }

      // Write back
      for (const p of allPlayers) {
        const st = statsMap[p.id] || {};
        const mediaVoto = st.votiTotali > 0 ? st.votiSum / st.votiTotali : 0;
        const mediaPunti = st.partiteTotali > 0 ? st.puntiTotali / st.partiteTotali : 0;
        await db.players.update(p.id, {
          goalTotali:        st.goalTotali || 0,
          assistTotali:      st.assistTotali || 0,
          autogolTotali:     st.autogolTotali || 0,
          uomoPartitaTotali: st.uomoPartitaTotali || 0,
          puntiTotali:       st.puntiTotali || 0,
          partiteTotali:     st.partiteTotali || 0,
          mediaPunti:        mediaPunti,
          mediaVoto:         mediaVoto,
          votiTotali:        st.votiTotali || 0
        });
      }
      await loadGroupData();
    };
    // ── Refresh expired Firebase ID token automatically ──
    const refreshFirebaseToken = async () => {
      const refreshToken = localStorage.getItem('amicifc_fb_refresh');
      const apiKey = (settings.value.firebaseApiKey || '').trim();
      if (!refreshToken || !apiKey) return false;
      try {
        const r = await fetch(
          `https://securetoken.googleapis.com/v1/token?key=${apiKey}`,
          { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
            body: `grant_type=refresh_token&refresh_token=${encodeURIComponent(refreshToken)}` }
        );
        const d = await r.json();
        if (d.id_token) {
          fbIdToken.value = d.id_token;
          localStorage.setItem('amicifc_fb_token', d.id_token);
          if (d.refresh_token) localStorage.setItem('amicifc_fb_refresh', d.refresh_token);
          console.log('[AmiciFC] Token refreshed ✅');
          return true;
        }
      } catch(e) {
        console.warn('[AmiciFC] Token refresh failed:', e.message);
      }
      return false;
    };

    // ── AUTO-SYNC: chiamato dopo ogni salvataggio se Firebase è attivo ──
    const autoSyncToCloud = async () => {
      // Solo se Firebase configurato E utente loggato
      if (!settings.value.firebaseUrl || !fbIdToken.value) return;
      try {
        await syncToCloud();
        // Sync silenzioso: nessun toast (l'utente non deve essere disturbato)
      } catch(e) {
        console.warn('[AutoSync] Errore sync Firebase:', e.message);
      }
    };

    const syncToCloud = async () => {
      const base = getFirebaseBase();
      if (!base) return toast('Inserisci URL Firebase nelle impostazioni!', 'error');
      if (!fbIdToken.value && !firebaseUser.value) {
        return toast('⚠️ Devi fare il login per caricare dati.', 'error');
      }
      syncLoading.value = true;
      try {
        const allGroups = [];
        for (const g of groups.value) {
          const players = await db.players.where('groupId').equals(g.id).toArray();
          const matches  = await db.matches.where('groupId').equals(g.id).toArray();
          allGroups.push({ group: g, players, matches });
        }
        const payload = { lastUpdate: new Date().toISOString(), appVersion: appVersion.value, groups: allGroups };

        const doUpload = async (token) => {
          const authSuffix = token ? `?auth=${token}` : '';
          return fetch(`${base}.json${authSuffix}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        };

        let resp = await doUpload(fbIdToken.value);

        // 401 = token expired → try refresh once
        if (resp.status === 401) {
          toast('⏳ Token scaduto, rinnovo automatico...', 'info', 3000);
          const refreshed = await refreshFirebaseToken();
          if (refreshed) {
            resp = await doUpload(fbIdToken.value);
          } else {
            // Can't refresh — ask user to re-login
            firebaseUser.value = null;
            fbIdToken.value = '';
            localStorage.removeItem('amicifc_fb_user');
            localStorage.removeItem('amicifc_fb_token');
            throw new Error('Sessione scaduta. Esegui nuovamente il login nelle impostazioni.');
          }
        }

        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        lastSyncDate.value = new Date().toLocaleString('it-IT');
        localStorage.setItem('amicifc_last_sync', lastSyncDate.value);
        toast('✅ Dati caricati sul cloud!');
      } catch (e) {
        toast('❌ ' + e.message, 'error', 8000);
      }
      syncLoading.value = false;
    };

    const syncFromCloud = async () => {
      const base = getFirebaseBase();
      if (!base) return toast('Inserisci URL Firebase nelle impostazioni!', 'error');
      syncLoading.value = true;
      try {
        const resp = await fetch(`${base}.json`, { cache: 'no-store' });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        if (!data || !data.groups) throw new Error('Nessun dato trovato nel cloud');

        let syncedGroups=0, syncedPlayers=0, syncedMatches=0;

        for (const eg of data.groups) {
          const g = eg.group;
          if (!g?.nome) continue;

          // Find or create the group
          let existing = groups.value.find(x => x.nome === g.nome);
          let gid;
          if (!existing) {
            gid = await db.groups.add({ nome: g.nome });
          } else {
            gid = existing.id;
          }
          syncedGroups++;

          // ── PLAYERS: sync by uid (stable cross-device ID) ──
          const cloudPlayers = eg.players || [];
          const localPlayers = await db.players.where('groupId').equals(gid).toArray();
          const idMap = {}; // cloud local-id → our local-id (for match remapping)

          for (const cp of cloudPlayers) {
            // Ensure cloud player has a REAL uid (never use name as uid)
            const isRealUid = u => u && u.length > 8 && !u.includes('|');
            const cpUid = isRealUid(cp.uid) ? cp.uid : uuid();
            const lp = localPlayers.find(x => x.uid === cpUid) ||
                       localPlayers.find(x => x.nome === cp.nome && x.cognome === cp.cognome);

            if (lp) {
              // Player exists locally — cloud is source of truth for profile fields
              // For stats: take the MAXIMUM (never downgrade)
              await db.players.update(lp.id, {
                uid:         cpUid,
                nome:        cp.nome        ?? lp.nome,
                cognome:     cp.cognome     ?? lp.cognome,
                soprannome:  cp.soprannome  ?? lp.soprannome,
                ruolo:       cp.ruolo       ?? lp.ruolo,
                piede:       cp.piede       ?? lp.piede,
                descrizione: cp.descrizione ?? lp.descrizione,
                foto:        cp.foto        || lp.foto,
                goalTotali:        Math.max(cp.goalTotali        ||0, lp.goalTotali        ||0),
                assistTotali:      Math.max(cp.assistTotali      ||0, lp.assistTotali      ||0),
                autogolTotali:     Math.max(cp.autogolTotali     ||0, lp.autogolTotali     ||0),
                uomoPartitaTotali: Math.max(cp.uomoPartitaTotali ||0, lp.uomoPartitaTotali ||0),
                puntiTotali:       Math.max(cp.puntiTotali       ||0, lp.puntiTotali       ||0),
                partiteTotali:     Math.max(cp.partiteTotali     ||0, lp.partiteTotali     ||0),
                mediaPunti:        cp.partiteTotali > 0 ? (cp.puntiTotali||0)/(cp.partiteTotali||1) :
                                   lp.partiteTotali > 0 ? (lp.puntiTotali||0)/(lp.partiteTotali||1) : 0,
                mediaVoto:    ((cp.mediaVoto||0) > 0 ? cp.mediaVoto : null) ??
                              ((lp.mediaVoto||0) > 0 ? lp.mediaVoto : 0),
                votiTotali:   Math.max(cp.votiTotali||0, lp.votiTotali||0)
              });
              if (cp.id !== undefined) idMap[String(cp.id)] = lp.id;
            } else {
              // New player — add with uid
              const { id: oldId, groupId: _g, ...rest } = cp;
              const newId = await db.players.add({ ...rest, uid: cpUid, groupId: gid });
              if (oldId !== undefined) idMap[String(oldId)] = newId;
              syncedPlayers++;
            }
          }
          // Map any local-only players to themselves
          localPlayers.forEach(lp => {
            if (!Object.values(idMap).includes(lp.id)) idMap[String(lp.id)] = lp.id;
          });

          // ── MATCHES: add only truly new ones (by data+scoreA+scoreB) ──
          const cloudMatches = eg.matches || [];
          const localMatches = await db.matches.where('groupId').equals(gid).toArray();
          const remapId = pid => {
            const mapped = idMap[String(pid)];
            return mapped !== undefined ? mapped : pid;
          };

          for (const cm of cloudMatches) {
            // Dedup by data + risultato (senza confrontare squadre che hanno ID diversi)
            const isDup = localMatches.some(lm =>
              lm.data === cm.data &&
              lm.risultato?.goalA === cm.risultato?.goalA &&
              lm.risultato?.goalB === cm.risultato?.goalB
            );
            if (!isDup) {
              const { id: _id, groupId: _gid, ...mRest } = cm;
              await db.matches.add({
                ...mRest,
                groupId: gid,
                squadraA: (mRest.squadraA||[]).map(remapId),
                squadraB: (mRest.squadraB||[]).map(remapId),
                statisticheGiocatori: (mRest.statisticheGiocatori||[]).map(s => ({
                  ...s, playerId: remapId(s.playerId)
                }))
              });
              syncedMatches++;
            }
          }
        }

        await loadGroups();
        await loadGroupData();
        // Ricalcola sempre le statistiche dai match dopo il sync
        await recomputeStats();
        lastSyncDate.value = new Date().toLocaleString('it-IT');
        localStorage.setItem('amicifc_last_sync', lastSyncDate.value);
        toast(`☁️ Sync completata: ${syncedPlayers} nuovi giocatori, ${syncedMatches} nuove partite`);
        // Pre-resolve all photos after sync
        groupPlayers.value.forEach(p => { if (p.uid) resolvePhoto(p.foto, p.uid); });
      } catch (e) {
        toast('❌ Errore sync: ' + e.message, 'error');
      }
      syncLoading.value = false;
    };

    const openCalMonths = ref([]);
    const toggleCalMonth = key => {
      const idx = openCalMonths.value.indexOf(key);
      if (idx >= 0) openCalMonths.value.splice(idx, 1);
      else openCalMonths.value.push(key);
    };

    const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                       'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
    const DAYS_IT   = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];

    const formatMonth = ym => {
      const [y, m] = ym.split('-');
      return `${MONTHS_IT[parseInt(m)-1]} ${y}`;
    };

    const getDayName = dateStr => {
      return DAYS_IT[new Date(dateStr).getDay()];
    };

    // ── Image filename helper — uses player UID for stable GitHub photo names ──
    // ── Image filename helper — uid-based, supports jpg or png ──
    // PNG supports transparency (better for cutout photos)
    const generateImageFilename = (uid, ext) => uid ? `${uid}.${ext||'jpg'}` : '';

    // ── Point 4: Scroll to top on every view change ──
    // Se i gruppi vengono svuotati DOPO il caricamento DB → onboarding
    // { immediate: false } evita il redirect durante il reload del SW
    watch(groups, (newGroups) => {
      if (dbLoaded.value && newGroups.length === 0) {
        currentView.value = 'onboarding';
      }

        resolvedPhotoUrls.value = { ...resolvedPhotoUrls.value, [cacheKey]: null }; // mark as pending

      const logoImg = await li(LOGO_EMBEDDED||logoDataUrl.value);

      Y+=14;Y=HR(Y,'#8B0000',2);

        if(upPhoto){const iw=upPhoto.naturalWidth||100,ih=upPhoto.naturalHeight||100,s2=Math.min(iw,ih),sx=(iw-s2)/2,sy=(ih-s2)/2;ctx.drawImage(upPhoto,sx,sy,s2,s2,mvpX+6,mvpY+6,MVP_W-12,MVP_H-58);}

    // ── Weather ──
    const WMO_CODES = {
      0:'☀️',1:'🌤️',2:'⛅',3:'☁️',
      45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',

      85:'🌨️',86:'❄️',95:'⛈️',96:'⛈️',99:'⛈️'
    };
    const WMO_DESC = {
      0:'Cielo sereno',1:'Principalmente sereno',2:'Parzialmente nuvoloso',3:'Nuvoloso',
      45:'Nebbia',48:'Nebbia ghiacciata',51:'Pioggerella leggera',53:'Pioggerella',55:'Pioggerella intensa',
      61:'Pioggia leggera',63:'Pioggia',65:'Pioggia intensa',71:'Neve leggera',73:'Neve',75:'Neve intensa',
      80:'Rovesci leggeri',81:'Rovesci',82:'Rovesci forti',95:'Temporale',96:'Temporale con grandine',99:'Temporale forte'
    };

    const processWeatherData = (data, cityName) => {
      const c = data.current;
      const code = c.weather_code;
      const temp = Math.round(c.temperature_2m);
      const wind = Math.round(c.wind_speed_10m);
      const emoji = WMO_CODES[code] || '🌡️';
      const desc  = WMO_DESC[code]  || 'Condizioni variabili';
      // Can we play calcetto?
      let playMsg, playCss;
      if ([95,96,99].includes(code) || wind > 50) { playMsg='❌ No calcetto!'; playCss='badge-red'; }
      else if ([65,75,82].includes(code) || wind > 30) { playMsg='⚠️ Rischio'; playCss='badge-yellow'; }
      else if (temp < 2) { playMsg='🥶 Molto freddo'; playCss='badge-yellow'; }
      else { playMsg='✅ Si gioca!'; playCss='badge-lime'; }

      weather.value = { loading:false, error:false, emoji, temp, desc, wind, city: cityName, playMsg, playCss, cityInput: weather.value.cityInput };
    };

    const fetchWeatherByCoords = async (lat, lon, city='') => {
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m&timezone=auto`;
        const r = await fetch(url);
        const data = await r.json();
        // Geocode city name if not given
        let cityName = city;
        if (!cityName) {
          try {
            const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
            const gd = await geo.json();
            cityName = gd.address?.city || gd.address?.town || gd.address?.village || 'La tua posizione';
          } catch { cityName = 'La tua posizione'; }
        }
        processWeatherData(data, cityName);
      } catch { weather.value = { ...weather.value, loading: false, error: true }; }
    };

    const fetchWeatherByCity = async () => {
      const city = weather.value.cityInput.trim();
      if (!city) return;
      weather.value.loading = true;
      try {
        const geo = await fetch(`https://nominatim.openstreetmap.org/search?city=${encodeURIComponent(city)}&format=json&limit=1`);
        const [place] = await geo.json();
        if (!place) { toast('Città non trovata!', 'error'); weather.value.loading = false; weather.value.error = true; return; }
        await fetchWeatherByCoords(place.lat, place.lon, place.display_name.split(',')[0]);
      } catch { weather.value = { ...weather.value, loading: false, error: true }; }
    };

    const applyWeatherCity = () => {
      saveSettings();
      if (settings.value.weatherCity.trim()) {
        weather.value.cityInput = settings.value.weatherCity.trim();
        fetchWeatherByCity();
      } else {
        initWeather();
      }
    };

    const initWeather = () => {
      // If user has a saved city, use it; otherwise GPS
      if (settings.value.weatherCity.trim()) {
        weather.value.loading = true; weather.value.error = false;
        weather.value.cityInput = settings.value.weatherCity.trim();
        fetchWeatherByCity();
        return;
      }
      weather.value.loading = true;
      weather.value.error   = false;
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => fetchWeatherByCoords(pos.coords.latitude, pos.coords.longitude),
          ()  => { weather.value = { ...weather.value, loading: false, error: true }; }
        , { timeout: 8000 });
      } else {
        weather.value = { ...weather.value, loading: false, error: true };
      }

    const firebaseLogin = async () => {
      // Read directly from DOM by ID — 100% reliable
      const emailEl = document.getElementById('fb-login-email');
      const pwdEl   = document.getElementById('fb-login-pwd');
      const email   = (emailEl?.value || '').trim();
      const pwd     = (pwdEl?.value   || '').trim();
      const apiKey  = (settings.value.firebaseApiKey || '').trim();

      console.log('[Login] email:', JSON.stringify(email), 'pwd.length:', pwd.length, 'apiKey:', apiKey.slice(0,8)||'MISSING');

      if (!email)  { toast('Inserisci la tua email', 'error'); emailEl?.focus(); return; }
      if (!pwd)    { toast('Inserisci la password',   'error'); pwdEl?.focus();   return; }
      if (!apiKey) { toast('Inserisci la Chiave API Web Firebase nelle impostazioni', 'error'); return; }
      if (location.protocol === 'file:') { toast('⚠️ Il login non funziona in locale. Usa GitHub Pages.', 'error', 6000); return; }

      fbAuthLoading.value = true;
      try {
        const r = await fetch(
          `https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${apiKey}`,
          { method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ email, password: pwd, returnSecureToken: true }) }
        );
        const d = await r.json();
        if (d.error) {
          const msg = d.error.message || '';
          if (msg.includes('INVALID_LOGIN_CREDENTIALS') || msg.includes('INVALID_PASSWORD'))
            throw new Error('Email o password errati');
          if (msg.includes('EMAIL_NOT_FOUND'))
            throw new Error('Email non trovata in Firebase Authentication');
          if (msg.includes('TOO_MANY_ATTEMPTS'))
            throw new Error('Troppi tentativi. Attendi qualche minuto.');
          if (msg.includes('INVALID_API_KEY'))
            throw new Error('Chiave API non valida');
          throw new Error(msg);
        }
        firebaseUser.value = { email: d.email, uid: d.localId };
        fbIdToken.value    = d.idToken;
        localStorage.setItem('amicifc_fb_user',    JSON.stringify(firebaseUser.value));
        localStorage.setItem('amicifc_fb_token',   d.idToken);
        localStorage.setItem('amicifc_fb_refresh', d.refreshToken || ''); // store refresh token
        if (emailEl) emailEl.value = '';
        if (pwdEl)   pwdEl.value   = '';
        showFbPwd.value = false;
        toast(`✅ Connesso come ${d.email}!`);
      } catch(e) {
        toast('❌ ' + e.message, 'error', 8000);
      }
      fbAuthLoading.value = false;
    };

    const openExportModal = () => {

      showExportModal.value = true;

    const doExport = async () => {
      if (!exportGroupIds.value.length) return;

      const exportGroups = [];
      for (const gid of exportGroupIds.value) {
        const g       = groups.value.find(x => x.id === gid);
        const players = await db.players.where('groupId').equals(gid).toArray();
        const matches = await db.matches.where('groupId').equals(gid).toArray();
        // photos (base64) already inside player.foto — automatically included
        exportGroups.push({ group: g, players, matches });
      }

      const data = {
        exportDate:  new Date().toISOString(),
        appVersion:  appVersion.value,
        multiGroup:  true,
        groups:      exportGroups
      };

      const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url;
      const names = exportGroups.map(eg => eg.group.nome.replace(/\s+/g,'-')).join('_');
      a.download = `amicifc-${names}-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showExportModal.value = false;
      toast(`✅ Esportati ${exportGroups.length} gruppo/i con successo!`);
    };

    const exportData = () => openExportModal(); // alias legacy

    const importData = async e => {
      const file = e.target?.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);

        // Detect format: new multi-group vs old single-group
        const groupsToImport = data.multiGroup
          ? data.groups
          : data.group ? [{ group: data.group, players: data.players||[], matches: data.matches||[] }]
          : null;

        if (!groupsToImport) throw new Error('Formato file non riconosciuto');

        const names = groupsToImport.map(g => `"${g.group?.nome}"`).join(', ');
        if (!confirm(`Importare ${groupsToImport.length} gruppo/i:\n${names}\n\nI dati verranno aggiunti nel database locale.`)) return;

        let totalPlayers = 0, totalMatches = 0, newGroups = 0;
        let firstImportedGroupId = null;

        for (const eg of groupsToImport) {
          const newName = eg.group?.nome || 'Gruppo Importato';
          const existing = groups.value.find(g => g.nome === newName);
          const gid = existing
            ? existing.id
            : await db.groups.add({ nome: newName });

          if (!existing) newGroups++;
          if (firstImportedGroupId === null) firstImportedGroupId = gid;

          // ── Import players + build OLD_ID → NEW_ID map ──
          const idMap = {}; // old string/numeric id → new Dexie id
          const currentPlayers = await db.players.where('groupId').equals(gid).toArray();

          for (const p of (eg.players||[])) {
            const dup = currentPlayers.find(x => x.nome===p.nome && x.cognome===p.cognome);
            if (dup) {
              // Already exists: map old id to existing id
              if (p.id !== undefined && p.id !== null) idMap[String(p.id)] = dup.id;
            } else {
              // Insert without old id, let Dexie auto-assign
              const { id: oldId, groupId: _gid, ...rest } = p;
              const newId = await db.players.add({ ...rest, groupId: gid });
              if (oldId !== undefined && oldId !== null) idMap[String(oldId)] = newId;
              totalPlayers++;
            }
          }

          // ── Import matches with remapped player IDs ──
          const currentMatches = await db.matches.where('groupId').equals(gid).toArray();

          for (const m of (eg.matches||[])) {
            const dup = currentMatches.find(x =>
              x.data === m.data &&
              x.risultato?.goalA === m.risultato?.goalA &&
              x.risultato?.goalB === m.risultato?.goalB
            );
            if (!dup) {
              const { id: _id, groupId: _gid2, ...mRest } = m;

              // Remap all player ID references
              const remapId = pid => idMap[String(pid)] ?? pid;

              const remappedMatch = {
                ...mRest,
                groupId: gid,
                squadraA: (mRest.squadraA || []).map(remapId),
                squadraB: (mRest.squadraB || []).map(remapId),
                statisticheGiocatori: (mRest.statisticheGiocatori || []).map(s => ({
                  ...s,
                  playerId: remapId(s.playerId)
                }))
              };
              await db.matches.add(remappedMatch);
              totalMatches++;
            }
          }
        }

        // Reload and auto-select the first imported group
        await loadGroups();
        const importedGroup = groups.value.find(g => g.id === firstImportedGroupId);
        if (importedGroup) await selectGroup(importedGroup);
        else await loadGroupData();

        // FIX: Ricalcola statistiche da tutti i match importati
        if (importedGroup || groups.value.length > 0) {
          await recomputeStats();
        }

        toast(`✅ Importati: ${newGroups} gruppi, ${totalPlayers} giocatori, ${totalMatches} partite!`);
        return true; // success flag for importDataAndGo
      } catch (err) {
        console.error('Import error:', err);
        toast('❌ Errore importazione: ' + err.message, 'error');
        return false;
      } finally {
        if (e.target) e.target.value = '';
      }
    };

    const resetData = async () => {
      if (!currentGroup.value) return;
      const nome = currentGroup.value.nome;
      if (!confirm(`⚠️ RESET COMPLETO di "${nome}"?\n\nVerranno eliminati:\n• Tutti i giocatori\n• Tutte le partite\n• Il gruppo stesso\n\nQuesta azione non può essere annullata.`)) return;

      const gid = currentGroup.value.id;
      // Delete players, matches AND the group itself
      await db.players.where('groupId').equals(gid).delete();
      await db.matches.where('groupId').equals(gid).delete();
      await db.groups.delete(gid);

      currentGroup.value = null;
      await loadGroups();

      if (groups.value.length > 0) {
        // Other groups exist: select the first one and go to home
        await selectGroup(groups.value[0]);
        currentView.value = 'home';
        toast(`🗑️ "${nome}" eliminato. Gruppo attivo: ${groups.value[0].nome}`, 'info');
      } else {
        // No groups left: back to onboarding
        groupPlayers.value = [];
        groupMatches.value = [];

        toast(`🗑️ "${nome}" eliminato. Torna alla schermata iniziale.`, 'info');

    const totalReset = async () => {

        '🚨 RESET TOTALE\n\n' +
        'Questa operazione cancella TUTTO localmente:\n' +
        '• Tutti i gruppi e giocatori\n' +
        '• Tutte le partite e statistiche\n' +
        '• API key e URL Firebase\n' +
        '• Impostazioni\n\n' +
        'I dati su Firebase NON vengono toccati.\n' +
        'Sei sicuro di voler azzerare tutto?'
      )) return;
      if (!confirm('✋ CONFERMA FINALE: cancellare tutto il database locale?')) return;
      try {

        await db.groups.clear();
        await db.players.clear();
        await db.matches.clear();

    // ── Update Check ──
    const checkForUpdates = async () => {
      try {
        // Fetch sempre dalla rete, mai cache
        const resp = await fetch('./version.json?nocache=' + Date.now(), { cache: 'no-store' });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (!data.version) return;
        // Always update date from version.json
        if (data.date) appDate.value = data.date;

        const parseVer = v => {
          const parts = String(v).split('.');
          return parseInt(parts[0]) * 1000 + (parseInt(parts[1]) || 0);
        };
        const remoteVer  = parseVer(data.version);
        const currentVer = parseVer(appVersion.value);

        if (remoteVer > currentVer) {
          newVersion.value      = data.version;
          updateAvailable.value = true;
          toast(`🎉 Versione ${data.version} disponibile! Premi Aggiorna.`, 'info', 8000);
        } else {
          toast('✅ App già aggiornata (v' + appVersion.value + ')', 'info', 3000);
        }
      } catch (err) {
        console.warn('[AmiciFC] Update check failed:', err);
        toast('⚠️ Controllo aggiornamenti fallito: ' + err.message, 'info', 4000);
      }
    };

    const doUpdate = async () => {
      toast('⏳ Pulizia cache e ricarica...', 'info', 2000);
      try {
        // 1. Svuota tutti i cache del SW
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
        // 2. Attiva il nuovo SW se in attesa
        if ('serviceWorker' in navigator) {
          const reg = await navigator.serviceWorker.ready;
          if (reg.waiting) {
            sessionStorage.setItem('sw-update-pending', '1');
            reg.waiting.postMessage('SKIP_WAITING');
          }
        }
      } catch(e) {
        console.warn('[AmiciFC] doUpdate error:', e);
      }
      // 3. Ricarica hard bypassando cache del browser
      setTimeout(() => window.location.reload(true), 500);

    // ── Lifecycle ──
    onMounted(async () => {
      // Scroll to very top on startup (iOS Safari sometimes restores scroll position)
      window.scrollTo({ top: 0, behavior: 'instant' });
      document.body.scrollTop = 0;
      document.documentElement.scrollTop = 0;

      // Load settings
      try {
        const s = JSON.parse(localStorage.getItem('amicifc_settings')||'{}');
        // darkTheme defaults to true if not set
        if (s.darkTheme === undefined) s.darkTheme = true;
        Object.assign(settings.value, s);
        document.documentElement.setAttribute('data-theme', settings.value.darkTheme ? 'dark' : 'light');
        if (settings.value.fontLarge) {
          document.documentElement.style.setProperty('--font-scale','1.18');
          document.documentElement.style.fontSize = 'calc(16px * 1.18)';
        }
      } catch {}

      // Load DB
      await loadGroups();

      // Repair any malformed player UIDs (e.g. "Nome|Cognome" from old sync bug)
      await repairPlayerUids();

      // Restore last group
      const lastGid = localStorage.getItem('amicifc_group');
      if (lastGid) {
        const g = groups.value.find(x => String(x.id) === String(lastGid));
        if (g) await selectGroup(g);
      } else if (groups.value.length > 0) {
        await selectGroup(groups.value[0]);
      }

      // DB caricato: attiva il watch e controlla se serve onboarding
      dbLoaded.value = true;
      if (groups.value.length === 0) {
        currentView.value = 'onboarding';
      }

      // Load logo
      loadLogo();

      // Pre-resolve player photos (try both jpg/png proactively)
      groupPlayers.value.forEach(p => { if (p.uid) resolvePhoto(p.foto, p.uid); });
      // Pre-cache photos in SW for offline use
      setTimeout(precachePlayerPhotos, 2000);

      // Init weather
      initWeather();

      // Start news ticker
      startNewsTicker();

      // Register SW con auto-aggiornamento
      if ('serviceWorker' in navigator) {
        try {
          const reg = await navigator.serviceWorker.register('./sw.js?v=1040');

          // Se c'è un SW in attesa, attivalo subito
          if (reg.waiting) {
            reg.waiting.postMessage('SKIP_WAITING');
          }

          // Quando viene trovato un nuovo SW
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            nw?.addEventListener('statechange', () => {
              if (nw.state === 'installed') {
                nw.postMessage('SKIP_WAITING');
                newVersion.value = 'nuova';
                updateAvailable.value = true;
                toast('🎉 Aggiornamento disponibile! Premi Aggiorna.', 'info', 8000);
              }
            });
          });

          // Quando il controller cambia (nuovo SW attivo), ricarica UNA VOLTA
          let swRefreshed = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!swRefreshed && sessionStorage.getItem('sw-update-pending')) {
              swRefreshed = true;
              sessionStorage.removeItem('sw-update-pending');
              window.location.reload(true);
            }
          });

        } catch (e) { console.warn('[AmiciFC] SW registration failed:', e); }
      }

      // Check updates after 2s
      setTimeout(checkForUpdates, 2000);
      // Auto-sync after 3s if configured
      setTimeout(autoSync, 3000);
    });

    // Expose to template
    return {

      computeFormationPrediction

// ── Register SW ──
if ('serviceWorker' in navigator) {
  // Unregister ALL old service workers first, then re-register fresh
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => {
      if (!r.active?.scriptURL?.includes('v=1040')) {
        console.log('[AmiciFC] Removing old SW:', r.active?.scriptURL);
        r.unregister();
      }
    });
  });
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js?v=1040').catch(console.warn);
  });
}
