<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3A7BFF"/>
      <stop offset="100%" stop-color="#1a3a8f"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="ballGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </radialGradient>
  </defs>

  <!-- Outer circle -->
  <circle cx="200" cy="185" r="150" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <circle cx="200" cy="185" r="150" fill="none" stroke="#A6FF4D" stroke-width="6"/>

  <!-- Soccer ball body -->
  <circle cx="200" cy="175" r="90" fill="url(#ballGrad)"/>

  <!-- Ball pentagon patches -->
  <polygon points="200,110 220,130 212,155 188,155 180,130" fill="#1A1A1A" opacity="0.85"/>
  <polygon points="145,148 165,132 185,148 178,170 152,170" fill="#1A1A1A" opacity="0.85"/>
  <polygon points="255,148 235,132 215,148 222,170 248,170" fill="#1A1A1A" opacity="0.85"/>
  <polygon points="165,208 178,192 222,192 235,208 210,225 190,225" fill="#1A1A1A" opacity="0.75"/>

  <!-- Cute eyes -->
  <!-- Left eye white -->
  <ellipse cx="175" cy="163" rx="18" ry="20" fill="white"/>
  <!-- Right eye white -->
  <ellipse cx="225" cy="163" rx="18" ry="20" fill="white"/>
  <!-- Left pupil -->
  <circle cx="178" cy="165" r="10" fill="#1A1A1A"/>
  <circle cx="181" cy="162" r="4" fill="white"/>
  <!-- Right pupil -->
  <circle cx="228" cy="165" r="10" fill="#1A1A1A"/>
  <circle cx="231" cy="162" r="4" fill="white"/>

  <!-- Blush cheeks -->
  <ellipse cx="155" cy="190" rx="16" ry="10" fill="#FF9999" opacity="0.6"/>
  <ellipse cx="245" cy="190" rx="16" ry="10" fill="#FF9999" opacity="0.6"/>

  <!-- Big smile -->
  <path d="M 162 198 Q 200 232 238 198" stroke="#1A1A1A" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Tongue -->
  <ellipse cx="200" cy="218" rx="18" ry="10" fill="#FF6B6B"/>
  <line x1="200" y1="208" x2="200" y2="228" stroke="#e05050" stroke-width="2"/>

  <!-- Stars / sparkles -->
  <text x="75" y="100" font-size="28" fill="#FFD93D">✦</text>
  <text x="305" y="95" font-size="22" fill="#FFD93D">✦</text>
  <text x="90" y="145" font-size="16" fill="#A6FF4D">✦</text>
  <text x="295" y="150" font-size="18" fill="#A6FF4D">✦</text>

  <!-- Banner ribbon -->
  <path d="M 55 285 Q 200 315 345 285 L 340 330 Q 200 360 60 330 Z" fill="#FFD93D"/>
  <path d="M 55 285 L 40 305 L 60 330 Q 55 315 55 285 Z" fill="#e6a800"/>
  <path d="M 345 285 L 360 305 L 340 330 Q 345 315 345 285 Z" fill="#e6a800"/>
  <!-- Banner border -->
  <path d="M 55 285 Q 200 315 345 285 L 340 330 Q 200 360 60 330 Z" fill="none" stroke="#1A1A1A" stroke-width="3"/>

  <!-- "AMICI FC" text on banner -->
  <text x="200" y="325" text-anchor="middle" font-family="'Arial Black', sans-serif"
    font-size="36" font-weight="900" fill="#1A1A1A" letter-spacing="2">AMICI FC</text>
  <text x="200" y="325" text-anchor="middle" font-family="'Arial Black', sans-serif"
    font-size="36" font-weight="900" fill="#ffffff" letter-spacing="2"
    style="paint-order:stroke" stroke="#1A1A1A" stroke-width="1">AMICI FC</text>
</svg>
